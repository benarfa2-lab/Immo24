<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable — Immo24.tn</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,300;1,9..144,700\&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800\&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231B3A6B'/><text x='16' y='22' text-anchor='middle' font-size='16' font-weight='900' font-family='sans-serif' fill='%23E6A817'>I</text></svg>" />
  <style>
    :root {
      --navy: #1B3A6B; --navy-dark: #122952; --gold: #E6A817;
      --gray-400: #ADB5BD; --gray-600: #6C757D; --gray-50: #F8F9FA;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--gray-50);
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
      color: var(--navy);
    }
    .wrapper { text-align: center; max-width: 480px; }

    /* House SVG illustration */
    .illustration { margin-bottom: 40px; }
    .illustration svg { width: 180px; height: auto; }

    .code {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(72px, 18vw, 120px);
      font-weight: 900;
      color: var(--navy);
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 8px;
      position: relative;
    }
    .code span { color: var(--gold); }

    .title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 22px; font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 15px; color: var(--gray-600);
      line-height: 1.6; margin-bottom: 36px;
    }

    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 600; font-family: 'Fraunces', Georgia, serif;
      cursor: pointer; border: none; text-decoration: none;
      transition: all .18s;
    }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--navy-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(27,58,107,.25); }
    .btn-gold { background: var(--gold); color: var(--navy); }
    .btn-gold:hover { background: #c8900e; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(230,168,23,.35); }

    .breadcrumb {
      margin-top: 40px;
      font-size: 12px; color: var(--gray-400);
    }
    .breadcrumb a { color: var(--gray-600); text-decoration: underline; text-underline-offset: 3px; }
    .breadcrumb a:hover { color: var(--navy); }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="illustration">
      <svg viewBox="0 0 200 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Ground -->
        <rect x="10" y="138" width="180" height="4" rx="2" fill="#E9ECEF"/>
        <!-- House body -->
        <rect x="52" y="80" width="96" height="62" rx="4" fill="#EEF2F9"/>
        <!-- Roof -->
        <path d="M40 84 L100 38 L160 84Z" fill="#1B3A6B"/>
        <!-- Door -->
        <rect x="86" y="108" width="28" height="34" rx="4" fill="#1B3A6B"/>
        <circle cx="110" cy="126" r="2.5" fill="#E6A817"/>
        <!-- Window left -->
        <rect x="60" y="96" width="20" height="18" rx="3" fill="white"/>
        <line x1="70" y1="96" x2="70" y2="114" stroke="#E9ECEF" stroke-width="1.5"/>
        <line x1="60" y1="105" x2="80" y2="105" stroke="#E9ECEF" stroke-width="1.5"/>
        <!-- Window right -->
        <rect x="120" y="96" width="20" height="18" rx="3" fill="white"/>
        <line x1="130" y1="96" x2="130" y2="114" stroke="#E9ECEF" stroke-width="1.5"/>
        <line x1="120" y1="105" x2="140" y2="105" stroke="#E9ECEF" stroke-width="1.5"/>
        <!-- Question mark on roof -->
        <text x="98" y="70" font-size="22" font-weight="900" font-family="Fraunces,Georgia,serif" fill="#E6A817" text-anchor="middle">?</text>
        <!-- Chimney -->
        <rect x="130" y="50" width="12" height="22" rx="2" fill="#122952"/>
        <!-- Smoke dots -->
        <circle cx="136" cy="44" r="3" fill="#DEE2E6" opacity=".7"/>
        <circle cx="140" cy="36" r="4" fill="#DEE2E6" opacity=".5"/>
        <circle cx="133" cy="28" r="5" fill="#DEE2E6" opacity=".3"/>
      </svg>
    </div>

    <div class="code">4<span>0</span>4</div>
    <div class="title">Cette page n'existe pas</div>
    <p class="subtitle">L'adresse que vous avez saisie est incorrecte ou le contenu a été déplacé. Revenez à l'accueil pour continuer votre recherche.</p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Retour à l'accueil
      </a>
      <a href="listing.html" class="btn btn-gold">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Voir les annonces
      </a>
    </div>

    <div class="breadcrumb">
      <a href="index.html">Accueil</a> · <a href="listing.html">Annonces</a> · <a href="contact.html">Contact</a>
    </div>
  </div>
</body>
</html>
