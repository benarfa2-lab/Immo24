<svg id="logo-light" width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pin gradient: navy brand -->
    <linearGradient id="pinG" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#2A5298"/>
      <stop offset="100%" stop-color="#0E2240"/>
    </linearGradient>
    <!-- Gold gradient for "24" -->
    <linearGradient id="goldG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#E6A817"/>
    </linearGradient>
    <!-- Pin glow -->
    <filter id="pinGlow" x="-40%" y="-20%" width="180%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1B3A6B" flood-opacity="0.35"/>
    </filter>
    <!-- Text glow for "24" -->
    <filter id="goldGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#E6A817" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- PIN ICON -->
  <!-- Teardrop shape -->
  <path d="M28 2C19.2 2 8 12.2 8 24C8 40.5 28 72 28 72C28 72 48 40.5 48 24C48 12.2 36.8 2 28 2Z"
        fill="url(#pinG)" filter="url(#pinGlow)"/>
  <!-- White circle inside pin -->
  <circle cx="28" cy="23" r="13" fill="white"/>
  <!-- House icon inside circle -->
  <path d="M16 22.5L28 14L40 22.5" fill="none" stroke="#1B3A6B" stroke-width="2.8"
        stroke-linejoin="round" stroke-linecap="round"/>
  <rect x="22" y="22" width="5" height="4.5" rx="1" fill="#E6A817"/>
  <rect x="29" y="22" width="5" height="4.5" rx="1" fill="#E6A817"/>
  <rect x="22" y="27.5" width="5" height="4" rx="1" fill="#E6A817"/>
  <rect x="29" y="27.5" width="5" height="4" rx="1" fill="#E6A817"/>

  <!-- Separator -->
  <line x1="62" y1="16" x2="62" y2="60" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>

  <!-- WORDMARK -->
  <text font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" letter-spacing="-0.5">
    <!-- "Immo" — white, medium weight -->
    <tspan x="76" y="46" font-size="33" fill="rgba(255,255,255,0.92)" font-weight="400">Immo</tspan>
    <!-- "24" — gold gradient, heavy -->
    <tspan font-size="40" fill="url(#goldG)" font-weight="900" dy="-3" filter="url(#goldGlow)">24</tspan>
    <!-- ".tn" — white muted -->
    <tspan font-size="20" fill="rgba(255,255,255,0.55)" font-weight="500" dy="5">.tn</tspan>
  </text>

  <!-- Tagline -->
  <text x="76" y="63" font-family="'Segoe UI',Arial,sans-serif" font-size="7"
        fill="rgba(255,255,255,0.30)" letter-spacing="3.8" font-weight="600">
    TROUVEZ · COMPAREZ · RÉALISEZ
  </text>
</svg>
